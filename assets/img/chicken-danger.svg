<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Body (dark) -->
  <ellipse cx="24" cy="30" rx="14" ry="12" fill="#4a0000" stroke="#ff4444" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Wing (spiked) -->
  <path d="M10 22 L14 28 L8 34 L16 32 L14 38" fill="#6a0000" stroke="#ff4444" stroke-width="0.8"/>
  <!-- Head -->
  <circle cx="32" cy="16" r="8" fill="#4a0000" stroke="#ff4444" stroke-width="1.5"/>
  <!-- Horns -->
  <path d="M28 8 L26 0 L30 6" fill="#ff4444"/>
  <path d="M34 8 L36 0 L32 6" fill="#ff4444"/>
  <!-- Angry eyes -->
  <circle cx="30" cy="14" r="3" fill="#ff4444"/>
  <circle cx="36" cy="14" r="3" fill="#ff4444"/>
  <circle cx="30" cy="14" r="1.2" fill="#ffeb3b"/>
  <circle cx="36" cy="14" r="1.2" fill="#ffeb3b"/>
  <!-- Brows -->
  <line x1="27" y1="10" x2="32" y2="12" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="39" y1="10" x2="34" y2="12" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Beak (sharp) -->
  <path d="M38 16 L46 17 L38 20 Z" fill="#ff6600" stroke="#cc3300" stroke-width="1"/>
  <!-- Claws -->
  <line x1="20" y1="40" x2="16" y2="46" stroke="#ff4444" stroke-width="2.5"/>
  <line x1="28" y1="40" x2="32" y2="46" stroke="#ff4444" stroke-width="2.5"/>
</svg>
