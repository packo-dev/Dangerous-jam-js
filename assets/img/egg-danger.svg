<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Egg (cracked, glowing) -->
  <ellipse cx="24" cy="26" rx="13" ry="17" fill="#1a0000" stroke="#ff4444" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Crack -->
  <path d="M18 20 L22 24 L18 28 L24 30 L20 34" stroke="#ff6600" stroke-width="2" fill="none"/>
  <!-- Fire glow from crack -->
  <path d="M20 24 Q24 18 22 26" fill="#ff6600" opacity="0.6"/>
  <!-- Angry eyes -->
  <circle cx="20" cy="22" r="2.5" fill="#ff4444"/>
  <circle cx="28" cy="22" r="2.5" fill="#ff4444"/>
  <circle cx="20" cy="22" r="1" fill="#ffeb3b"/>
  <circle cx="28" cy="22" r="1" fill="#ffeb3b"/>
  <!-- Angry brows -->
  <line x1="17" y1="18" x2="22" y2="20" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="18" x2="26" y2="20" stroke="#ff4444" stroke-width="2" stroke-linecap="round"/>
  <!-- Flames on top -->
  <path d="M20 10 Q22 4 24 10 Q26 4 28 10" fill="#ff4444" opacity="0.8" filter="url(#glow)"/>
</svg>
