<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320">
  <defs>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4cff72"/>
      <stop offset="100%" style="stop-color:#00cc44"/>
    </linearGradient>
    <linearGradient id="grad-red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ff3333"/>
    </linearGradient>
  </defs>

  <!-- DANGEROUS -->
  <text x="300" y="110" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace"
        font-size="62" font-weight="bold" fill="url(#grad-red)" filter="url(#glow-red)">
    DANGEROUS
  </text>

  <!-- HARVEST -->
  <text x="300" y="195" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace"
        font-size="68" font-weight="bold" fill="url(#grad-green)" filter="url(#glow-green)">
    HARVEST
  </text>

  <!-- Decorative items -->
  <text x="60" y="160" font-size="40" text-anchor="middle"><></text>
  <text x="540" y="160" font-size="40" text-anchor="middle">=%</text>

  <!-- Subtitle -->
  <text x="300" y="250" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace"
        font-size="14" fill="#ff6b6b" opacity="0.8" letter-spacing="4">
    "NOTHING IS SAFE"
  </text>

  <!-- Divider line -->
  <line x1="150" y1="270" x2="450" y2="270" stroke="#4cff72" stroke-width="1" opacity="0.3"/>

  <!-- Credits -->
  <text x="300" y="300" text-anchor="middle" font-family="'Press Start 2P', 'Courier New', monospace"
        font-size="10" fill="#555" letter-spacing="2">
    GAME JAM 2026
  </text>
</svg>
