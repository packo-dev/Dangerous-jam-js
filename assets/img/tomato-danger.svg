<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Fuse -->
  <rect x="23" y="2" width="2" height="8" fill="#555"/>
  <circle cx="24" cy="2" r="3" fill="#ff9800" filter="url(#glow)"/>
  <!-- Body (bomb) -->
  <ellipse cx="24" cy="28" rx="16" ry="14" fill="#333" stroke="#111" stroke-width="1.5" filter="url(#glow)"/>
  <!-- Angry eyes -->
  <circle cx="19" cy="24" r="3" fill="#ff4444"/>
  <circle cx="29" cy="24" r="3" fill="#ff4444"/>
  <circle cx="19" cy="24" r="1.2" fill="#fff"/>
  <circle cx="29" cy="24" r="1.2" fill="#fff"/>
  <!-- Angry brows -->
  <line x1="15" y1="19" x2="21" y2="21" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="33" y1="19" x2="27" y2="21" stroke="#ff4444" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mouth -->
  <path d="M18 32 Q24 36 30 32" stroke="#ff4444" stroke-width="2" fill="none"/>
  <!-- Skull mark -->
  <text x="24" y="30" font-size="8" text-anchor="middle" fill="#ff4444" opacity="0.3"> </text>
</svg>
